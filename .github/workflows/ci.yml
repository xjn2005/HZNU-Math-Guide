name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build-and-internal-links:
    name: Build and Internal Link Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build site
        run: npm run build
        working-directory: docs

      - name: Check internal links
        run: npm run check:links
        working-directory: docs

  external-links:
    name: External Link Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --retry-wait-time 5
            --max-retries 2
            --timeout 20
            --accept 200..299,403,429
            --exclude-mail
            --exclude-path docs/.vitepress/dist
            docs/**/*.md README.md
